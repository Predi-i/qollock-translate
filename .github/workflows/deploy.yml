name: Deploy

# Deploys the workbench from GitHub's runners instead of a local machine.
# Useful when the local network can't reach Cloudflare's upload API. Run it
# manually from the Actions tab (Deploy -> Run workflow).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply qollock-translate --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Push the runtime secrets onto the deployed Worker. GitHub reserves the
      # secret name GITHUB_TOKEN, so the PR token is stored as PR_GITHUB_TOKEN
      # here and mapped to the Worker's GITHUB_TOKEN binding.
      - name: Upload Worker secrets
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$OAUTH_CLIENT_SECRET" | pnpm exec wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
          printf '%s' "$PR_GITHUB_TOKEN" | pnpm exec wrangler secret put GITHUB_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          PR_GITHUB_TOKEN: ${{ secrets.PR_GITHUB_TOKEN }}
